<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Buku</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

<a href="katalog.html" class="btn btn-outline-primary mb-4">
<i class="bi bi-arrow-left"></i>
 Kembali
</a>

<div class="card shadow-lg border-0">

<div class="row g-0">

<div class="col-md-4">

<img src="komputer.png"

class="img-fluid rounded-start h-100"

style="object-fit:cover;">

</div>

<div class="col-md-8">

<div class="card-body p-4">

<h2 class="fw-bold">
Basis data
</h2>

<p class="text-muted">
Programer handal	
</p>

<span class="badge bg-success fs-6">
Tersedia
</span>

<hr>

<table class="table">

<tr>
<th>Penerbit</th>
<td>Yang Punya Website</td>
</tr>

<tr>
<th>Tahun</th>
<td>2005</td>
</tr>

<tr>
<th>Kategori</th>
<td>Komputer</td>
</tr>

<tr>
<th>ISBN</th>
<td>978xxxxxxxx</td>
</tr>

</table>

<p>

Pemrograman web adalah cara untuk membuat web</p>

<button

class="btn btn-success btn-lg"

data-bs-toggle="modal"

data-bs-target="#pinjamModal">

<i class="bi bi-book-fill"></i>

Pinjam Buku

</button>

</div>

</div>

</div>

</div>

</div>

<!-- Modal -->

<div class="modal fade" id="pinjamModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header bg-primary text-white">

<h5 class="modal-title">

Konfirmasi Peminjaman

</h5>

<button

class="btn-close btn-close-white"

data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body text-center">

<i class="bi bi-question-circle-fill text-primary display-3"></i>

<h4 class="mt-3">

Pinjam Buku Ini?

</h4>

<p>

Buku akan masuk ke daftar peminjaman Anda.

</p>

</div>

<div class="modal-footer">

<button

class="btn btn-secondary"

data-bs-dismiss="modal">

Batal

</button>

<button

class="btn btn-success"

onclick="pinjamBuku()">

Ya, Pinjam

</button>

</div>

</div>

</div>

</div>

<!-- Toast -->

<div class="position-fixed bottom-0 end-0 p-3">

<div

id="toastPinjam"

class="toast text-bg-success"

role="alert">

<div class="d-flex">

<div class="toast-body">

📚 Buku berhasil dipinjam.

</div>

<button

class="btn-close btn-close-white me-2 m-auto"

data-bs-dismiss="toast">

</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function pinjamBuku(){

const modal = bootstrap.Modal.getInstance(document.getElementById("pinjamModal"));

modal.hide();

const toast = new bootstrap.Toast(document.getElementById("toastPinjam"));

toast.show();

setTimeout(function(){

window.location.href="peminjaman.html";

},2000);

}

</script>

</body>
</html>
