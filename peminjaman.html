<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peminjaman Buku</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

<h2 class="mb-4">

<i class="bi bi-journal-bookmark-fill"></i>

Peminjaman Buku

</h2>

<div class="alert alert-info">

<i class="bi bi-info-circle"></i>

Silakan kembalikan buku sebelum tanggal jatuh tempo.

</div>

<div class="card shadow">

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-primary">

<tr>

<th>Cover</th>
<th>Judul Buku</th>
<th>Tanggal Pinjam</th>
<th>Jatuh Tempo</th>
<th>Status</th>
<th>Aksi</th>

</tr>

</thead>

<tbody>

<tr>

<td>

<img src="algoritma.png" class="rounded">

</td>

<td>

Algoritma

</td>

<td>

17 Juli 2026

</td>

<td>

24 Juli 2026

</td>

<td>

<span class="badge bg-warning text-dark">

Dipinjam

</span>

</td>

<td>

<button

class="btn btn-danger"

data-bs-toggle="modal"

data-bs-target="#kembaliModal">

<i class="bi bi-arrow-return-left"></i>

Kembalikan

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<!-- Modal -->

<div class="modal fade" id="kembaliModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header bg-danger text-white">

<h5>

Konfirmasi Pengembalian

</h5>

<button

class="btn-close btn-close-white"

data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body text-center">

<h4>

Yakin ingin mengembalikan buku?

</h4>

</div>

<div class="modal-footer">

<button

class="btn btn-secondary"

data-bs-dismiss="modal">

Batal

</button>

<button

class="btn btn-danger"

onclick="kembalikanBuku()">

Ya, Kembalikan

</button>

</div>

</div>

</div>

</div>

<!-- Toast -->

<div class="position-fixed bottom-0 end-0 p-3">

<div class="toast text-bg-success" id="toastKembali">

<div class="d-flex">

<div class="toast-body">

Buku berhasil dikembalikan.

</div>

<button

class="btn-close btn-close-white"

data-bs-dismiss="toast">

</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function kembalikanBuku(){

let modal = bootstrap.Modal.getInstance(document.getElementById("kembaliModal"));

modal.hide();

let toast = new bootstrap.Toast(document.getElementById("toastKembali"));

toast.show();

setTimeout(function(){

window.location.href="riwayat.html";

},2000);

}

</script>

</body>
</html>
