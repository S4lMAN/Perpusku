<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontak Kami</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

<div class="text-center mb-5">

<h1 class="fw-bold">

<i class="bi bi-envelope-fill text-primary"></i>

Hubungi Kami

</h1>

<p class="text-muted">

Silakan hubungi kami jika memiliki pertanyaan atau kendala.

</p>

</div>

<div class="row g-4">

<!-- Informasi -->

<div class="col-lg-5">

<div class="card shadow border-0 h-100">

<div class="card-body">

<h4 class="mb-4">

<i class="bi bi-building text-primary"></i>

Perpustakaan Digital

</h4>

<p>

<i class="bi bi-geo-alt-fill text-danger"></i>

Universitas Potensi Utama

Jl. KL Yos Sudarso Km. 6,5 No. 3A, Medan

</p>

<p>

<i class="bi bi-telephone-fill text-success"></i>

(061) 6640525

</p>

<p>

<i class="bi bi-envelope-fill text-warning"></i>

library@potensi-utama.ac.id

</p>

<p>

<i class="bi bi-clock-fill text-info"></i>

Senin - Jumat

08.00 - 16.00 WIB

</p>

<hr>

<h5>Ikuti Kami</h5>

<a href="#" class="btn btn-primary me-2">

<i class="bi bi-facebook"></i>

</a>

<a href="#" class="btn btn-danger me-2">

<i class="bi bi-instagram"></i>

</a>

<a href="#" class="btn btn-dark">

<i class="bi bi-twitter-x"></i>

</a>

</div>

</div>

</div>

<!-- Form -->

<div class="col-lg-7">

<div class="card shadow border-0">

<div class="card-body">

<h4 class="mb-4">

Kirim Pesan

</h4>

<form id="contactForm">

<div class="mb-3">

<label class="form-label">

Nama

</label>

<input

type="text"

class="form-control"

required>

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input

type="email"

class="form-control"

required>

</div>

<div class="mb-3">

<label class="form-label">

Pesan

</label>

<textarea

class="form-control"

rows="5"

required>

</textarea>

</div>

<button

type="submit"

class="btn btn-primary">

<i class="bi bi-send-fill"></i>

Kirim Pesan

</button>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- Toast -->

<div class="position-fixed bottom-0 end-0 p-3">

<div id="toastPesan"

class="toast text-bg-success">

<div class="d-flex">

<div class="toast-body">

Pesan berhasil dikirim.

</div>

<button

class="btn-close btn-close-white"

data-bs-dismiss="toast">

</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById("contactForm").addEventListener("submit",function(e){

e.preventDefault();

let toast=new bootstrap.Toast(document.getElementById("toastPesan"));

toast.show();

this.reset();

});

</script>

</body>

</html>
